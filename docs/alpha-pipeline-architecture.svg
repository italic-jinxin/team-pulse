<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">TeamPulse Alpha Pipeline Architecture</title>
  <desc id="desc">Architecture diagram showing React UI, API contract layer, app handlers, domain packages, boundary adapters, and external storage/services.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f3a5f"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #f7f9fc; }
      .lane { fill: #ffffff; stroke: #d7e0ea; stroke-width: 2; rx: 22; filter: url(#shadow); }
      .box { fill: #ffffff; stroke: #27496d; stroke-width: 2; rx: 16; filter: url(#shadow); }
      .box-blue { fill: #e9f2ff; }
      .box-green { fill: #e9f7ef; }
      .box-amber { fill: #fff5df; }
      .box-red { fill: #fff0f0; }
      .box-purple { fill: #f2ecff; }
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 32px; font-weight: 750; fill: #12263f; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; fill: #4c6178; }
      .lane-title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; font-weight: 750; fill: #27496d; letter-spacing: 0.02em; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 20px; font-weight: 750; fill: #12263f; }
      .body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 15px; fill: #334155; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; fill: #5b6f85; }
      .arrow { stroke: #1f3a5f; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #7992ac; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 7; }
      .badge { fill: #12263f; rx: 12; }
      .badge-text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 700; fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="820"/>

  <text x="70" y="70" class="title">TeamPulse Alpha Pipeline Architecture</text>
  <text x="70" y="102" class="subtitle">Stable local-first API, normalized GitHub facts, deterministic risks, and weekly reports.</text>

  <rect x="52" y="135" width="1296" height="125" class="lane"/>
  <text x="78" y="165" class="lane-title">PRESENTATION</text>

  <rect x="92" y="182" width="255" height="54" class="box box-blue"/>
  <text x="120" y="216" class="label">React UI</text>
  <text x="120" y="236" class="small">Dashboard pages and user actions</text>

  <rect x="432" y="182" width="295" height="54" class="box box-blue"/>
  <text x="460" y="216" class="label">Query Client</text>
  <text x="460" y="236" class="small">Polling, cache invalidation, loading/error state</text>

  <rect x="817" y="182" width="440" height="54" class="box box-blue"/>
  <text x="845" y="216" class="label">Frozen /api Contracts</text>
  <text x="845" y="236" class="small">List envelopes, structured errors, stable endpoint names</text>

  <path d="M347 209 H422" class="arrow"/>
  <path d="M727 209 H807" class="arrow"/>

  <rect x="52" y="300" width="1296" height="165" class="lane"/>
  <text x="78" y="330" class="lane-title">APPLICATION AND DOMAIN</text>

  <rect x="92" y="355" width="310" height="76" class="box box-green"/>
  <text x="120" y="389" class="label">App Handlers</text>
  <text x="120" y="411" class="body">Validation, orchestration, API errors, SPA serving</text>

  <rect x="515" y="355" width="285" height="76" class="box box-green"/>
  <text x="543" y="389" class="label">Sync Orchestrator</text>
  <text x="543" y="411" class="body">Jobs, repository scopes, partial failure handling</text>

  <rect x="912" y="355" width="300" height="76" class="box box-green"/>
  <text x="940" y="389" class="label">Domain Packages</text>
  <text x="940" y="411" class="body">Risk evaluation and weekly Markdown reports</text>

  <path d="M1037 236 V314 Q1037 342 1009 342 H247 Q219 342 219 355" class="arrow"/>
  <path d="M402 393 H505" class="arrow"/>
  <path d="M800 393 H902" class="arrow"/>

  <rect x="52" y="505" width="1296" height="185" class="lane"/>
  <text x="78" y="535" class="lane-title">BOUNDARIES AND FACT STORAGE</text>

  <rect x="92" y="565" width="310" height="76" class="box box-amber"/>
  <text x="120" y="599" class="label">SQLiteRepository</text>
  <text x="120" y="621" class="body">Persistence methods and query projections</text>

  <rect x="515" y="565" width="285" height="76" class="box box-amber"/>
  <text x="543" y="599" class="label">GitHub Client</text>
  <text x="543" y="621" class="body">Typed DTOs, pagination, origin-safe redirects</text>

  <rect x="912" y="565" width="300" height="76" class="box box-amber"/>
  <text x="940" y="599" class="label">Memory CredentialStore</text>
  <text x="940" y="621" class="body">PAT exists only in process memory</text>

  <path d="M247 431 V555" class="arrow"/>
  <path d="M657 431 V555" class="arrow"/>
  <path d="M1062 431 V555" class="arrow"/>

  <rect x="52" y="725" width="1296" height="70" class="lane"/>
  <text x="78" y="755" class="lane-title">EXTERNAL STATE</text>

  <rect x="230" y="742" width="310" height="40" class="box box-purple"/>
  <text x="255" y="767" class="body">Normalized SQLite fact tables and migrations</text>

  <rect x="820" y="742" width="255" height="40" class="box box-red"/>
  <text x="850" y="767" class="body">GitHub REST API</text>

  <path d="M247 641 V725 Q247 742 264 742" class="arrow"/>
  <path d="M657 641 V715 Q657 762 810 762" class="arrow"/>
  <path d="M1062 641 V715 Q1062 742 1045 742" class="arrow-soft"/>

  <rect x="1115" y="44" width="168" height="32" class="badge"/>
  <text x="1133" y="66" class="badge-text">Alpha pipeline</text>
</svg>
